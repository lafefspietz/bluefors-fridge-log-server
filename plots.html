<body>    
    <H1>plots</H1>
    <form id = "uploadform" action="upload-image.php" method="post" enctype="multipart/form-data">
            <span id ="uploadspan">Upload:</span>
        <input type="file" name="fileToUpload" id="fileToUpload">
        <input type="submit" value="Upload Image" name="submit" id ="submitinput">
    </form>
    <div class = "button" id = "reverseorderbutton">REVERSE ORDER OF PLOT DISPLAY</div>
    <div id = "image-feed"></div>
    <a href= "index.html">index.html</a>
    <a href="http://localhost:8888">http://localhost:8888</a>

<style>
body{
    font-family:Arial;
}
h1{
    text-align:center;
    font-size:4em;
}

a{
    text-align:center;
    font-size:3em;
    width:80%;
    margin:auto;
    display:block;
    border:solid;
    border-radius:0.5em;
    border-width:0.5em;
    color:black;
    margin-top:1em;
    margin-bottom:0.5em;
    overflow-x:scroll;
}
img{
    display:block;
    max-width:50%;
    margin:auto;
    margin-top:2em;
    margin-bottom:2em;
}
#image-feed img{
    border:solid;
    border-radius:1em;
    border-width:5px;
}
.button{
    font-size:2em;
    border:solid;
    cursor:pointer;
    text-align:center;
    max-width:50%;
    margin:auto;
}
.button:hover{
    background-color:green;
}
.button:active{
    background-color:yellow;
}
table, form{
    FONT-FAMILY:Arial;
}
#fileToUpload{
    cursor:pointer;
}

</style>
<script>

plots = [];

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        plots = JSON.parse(this.responseText);
        loadplots();
    }
};
httpc.open("GET", "list-files.php?directoryname=plots", true);
httpc.send();

reverseorder = false;

function loadplots(){
    document.getElementById("image-feed").innerHTML = "";
    plotsmd = "# Plots\n\n";//markdown code
    if(reverseorder == false){
        for(var index = 0;index < plots.length;index++) {
            var newimg = document.createElement("IMG");
            newimg.src = "plots/" + plots[index];
            plotsmd += "![](plots/" + plots[index] + ")\n";
            document.getElementById("image-feed").appendChild(newimg);
        }    
    }
    else{
        for(var index = plots.length - 1;index >= 0;index--) {
            var newimg = document.createElement("IMG");
            newimg.src = "plots/" + plots[index];
            document.getElementById("image-feed").appendChild(newimg);
        }    
    }
    //save plotsmd as plotsmd
    
    var url = "save-file.php";        
    var httpc2 = new XMLHttpRequest();
    httpc2.open("POST", url, true);
    httpc2.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc2.send("data="+encodeURIComponent(plotsmd)+"&filename=plots.md");//send text to filesaver.php
}


document.getElementById("reverseorderbutton").onclick = function(){
    reverseorder = !reverseorder;
    loadplots();
}
</script>
</body>
