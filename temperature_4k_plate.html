<body> 

<style>
body{
    overflow:none;
}
main{
    position:absolute;
    right:0px;
    top:0px;
}
</style>
<script>


jsondata = {};

function setup() {
  createCanvas(innerWidth,innerHeight);   
    var httpc = new XMLHttpRequest();
    httpc.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            jsondata = JSON.parse(this.responseText);
            displaytemp();
            //jsondata.temperature;
            //jsondata.time;

        }
    };
    httpc.open("GET", "load-file.php?filename=4kplatetemp.json", true);
    httpc.send();

    
}






function draw(){

    var httpc = new XMLHttpRequest();
    httpc.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            jsondata = JSON.parse(this.responseText);
            background(255);
            strokeWeight(0);  
            textSize(150);    
            fill("blue");
            stroke("blue");
            text("T_4k_plate = ",50,150);
            textSize(250);    
            text(jsondata.temperature.toString() + " K",50,480);
            text(jsondata.time,50,height - 200);

        }
    };
    httpc.open("GET", "load-file.php?filename=4kplatetemp.json", true);
    httpc.send();

}



</script>
